name: Deploy tutorial to GitHub Pages

# Builds the tutorial as a MyST (Jupyter Book) site: a clean book-style web page with
# prose, math, figures and animations, plus live in-browser code execution (Pyodide).
# After the first run, enable Pages once:  repo Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Jupyter Book (MyST)
        run: pip install "jupyter-book==2.1.5"
      - name: Build the book site
        env:
          BASE_URL: /shape_servoing_of_deformable_objects_tutorial
        run: python -m jupyter_book build --html
      - name: Serve helper modules for the in-browser kernel
        run: cp notebook/dlo.py notebook/ssviz.py _build/html/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
