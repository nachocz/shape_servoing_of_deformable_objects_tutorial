name: Deploy tutorial to GitHub Pages

# Publishes two things to GitHub Pages:
#   /            a clean, self-contained reading page (rendered notebook: prose, math,
#                figures and animations all embedded) -- this is the link to share.
#   /lite/       an interactive JupyterLite (in-browser Pyodide) version, for tinkering.
# After the first run, enable Pages once:  repo Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install "jupyterlite-core==0.4.*" "jupyterlite-pyodide-kernel==0.4.*" "jupyterlab~=4.2" "nbconvert>=7"
      - name: Render the clean reading page (index.html)
        run: |
          jupyter nbconvert --to html --output index --output-dir dist notebook/shape_servoing_tutorial.ipynb
          python tools/finalize_html.py dist/index.html
      - name: Build the interactive JupyterLite site (/lite)
        run: jupyter lite build --contents notebook --output-dir dist/lite
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
